<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SEW CONTROL PLUS - CLON PROFESIONAL</title>
    
    <!-- LIBRERÍA DEL MAPA -->
    <link rel="stylesheet" href="https://unpkg.com" />
    <script src="https://unpkg.com"></script>

    <style>
        :root { 
            --azul-corp: #2c3e50; --azul-brillante: #3498db; 
            --naranja: #f39c12; --naranja-oscuro: #d35400;
            --rojo: #e74c3c; --gris: #7f8c8d;
        }
        
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 0; margin: 0; text-align: center; }
        
        .card-compacta { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 95%; max-width: 400px; margin: 30px auto; border-top: 8px solid var(--azul-brillante); box-sizing: border-box; }
        .card-full { background: white; padding: 20px; width: 100%; min-height: 100vh; display: none; box-sizing: border-box; }
        
        input, select { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }
        .btn { background: linear-gradient(135deg, var(--naranja), var(--naranja-oscuro)); border: none; padding: 18px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; color: white; font-size: 16px; margin-top: 10px; }
        
        .pildoras-horizontal { display: flex; justify-content: space-around; gap: 10px; margin-bottom: 15px; }
        .pildora { background: #fff; padding: 10px; border-radius: 12px; flex: 1; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-bottom: 5px solid var(--azul-brillante); }
        .pildora h3 { font-size: 10px; color: var(--gris); margin: 0; text-transform: uppercase; }
        .pildora p { font-size: 22px; font-weight: bold; margin: 5px 0 0 0; color: var(--azul-corp); }
        
        #mapa-monitor { width: 100%; height: 350px; border-radius: 15px; margin: 15px 0; border: 2px solid var(--azul-brillante); z-index: 1; background: #eee; }
        
        .live-status { color: var(--naranja); font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 10px; }
        .dot { width: 10px; height: 10px; background: var(--naranja); border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        #reloj { font-weight: bold; color: var(--azul-corp); margin-bottom: 10px; display: block; font-size: 20px; }

        .box-descarga { background: #f9f9f9; padding: 15px; border-radius: 15px; border: 1px dashed #ccc; margin-bottom: 15px; }
        .input-f { width: 48% !important; display: inline-block !important; padding: 10px !important; margin: 5px 1% !important; font-size: 14px !important; }
    </style>
</head>
<body>

    <!-- LOGIN -->
    <div id="login" class="card-compacta">
        <h2 style="color:var(--azul-corp); margin:0;">SEW CONTROL</h2>
        <p style="font-size:12px; color:var(--gris);">SISTEMA DE GESTIÓN CLON</p>
        <input type="text" id="u" placeholder="Usuario">
        <input type="password" id="p" placeholder="Contraseña">
        <button class="btn" onclick="entrar()">INGRESAR AL SISTEMA</button>
    </div>

    <!-- PANTALLA OPERADOR -->
    <div id="ui-operador" class="card-compacta" style="display:none;">
        <h3 style="margin:0;">REGISTRO DE PILOTOS</h3>
        <input type="text" id="id-in" placeholder="ID PILOTO">
        <select id="mov">
            <option>INICIO DE VIAJE</option>
            <option>LLEGADA A DESTINO</option>
            <option>REGRESO A PLANTA</option>
        </select>
        <input type="text" id="placa" placeholder="PLACA DEL VEHÍCULO">
        <button id="btn-env" class="btn" onclick="enviar()">REGISTRAR MOVIMIENTO 🚀</button>
        <button onclick="location.reload()" style="background:none; border:none; color:var(--rojo); cursor:pointer; margin-top:15px; font-weight:bold;">Cerrar Sesión</button>
    </div>

    <!-- PANTALLA SUPERVISOR -->
    <div id="ui-supervisor" class="card-full">
        <h3 style="margin:0;">CENTRO DE MONITOREO</h3>
        <div class="live-status"><div class="dot"></div> RADAR SATELITAL ACTIVO</div>
        
        <div class="pildoras-horizontal">
            <div class="pildora"><h3>FLOTA</h3><p id="total-v">00</p></div>
            <div class="pildora" style="border-color:var(--naranja)"><h3>EN RUTA</h3><p id="en-ruta-v">00</p></div>
        </div>

        <span id="reloj">00:00:00</span>

        <div class="box-descarga">
            <p style="margin:0; font-size:11px; font-weight:bold;">REPORTE POR FECHAS</p>
            <input type="date" id="f-inicio" class="input-f">
            <input type="date" id="f-fin" class="input-f">
            <button class="btn" style="padding:10px; background: #27ae60;" onclick="descargarCSV()">📥 DESCARGAR EXCEL (CSV)</button>
        </div>

        <div id="mapa-monitor"></div>

        <button class="btn" style="background:#eee; color:#333; max-width:200px;" onclick="location.reload()">CERRAR MONITOR</button>
    </div>

    <script>
        // URL DEL CLON (Asegúrate de que el Apps Script tenga doGet y doPost)
        const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbw6gxVwtL5nx4t55NDr2LJ0E2ef6hJl5yrHctI24CHbrTJCyW1B3w6-sqeuwWuu81LP/exec"; 
        
        let mapaMonitor;

        function entrar() {
            const user = document.getElementById('u').value.toLowerCase().trim();
            const pass = document.getElementById('p').value;

            if(user === "operador" && pass === "operador1") {
                document.getElementById('login').style.display='none';
                document.getElementById('ui-operador').style.display='block';
            } 
            else if(user === "supervisor" && pass === "supervisor1") {
                document.getElementById('login').style.display='none';
                document.getElementById('ui-supervisor').style.display='block';
                iniciarReloj();
                setTimeout(iniciarMapa, 500); 
                actualizarDatos();
            } else {
                alert("Credenciales incorrectas");
            }
        }

        function iniciarReloj() {
            setInterval(() => { 
                const r = document.getElementById('reloj');
                if(r) r.innerText = new Date().toLocaleTimeString(); 
            }, 1000);
        }

        // GUARDAR DATOS (USA POST -> VA AL DOPOST DEL SCRIPT)
        function enviar() {
            const id = document.getElementById('id-in').value;
            const mov = document.getElementById('mov').value;
            const placa = document.getElementById('placa').value;
            const btn = document.getElementById('btn-env');

            if(!id) return alert("Ingrese ID");
            btn.innerText = "ENVIANDO..."; btn.disabled = true;

            const textoFinal = `${id};${mov};${placa}`;

            fetch(URL_SCRIPT, {
                method: 'POST',
                mode: 'no-cors',
                body: textoFinal
            }).then(() => {
                alert("✅ REGISTRO EXITOSO EN CLON");
                location.reload();
            }).catch(e => {
                alert("Error de envío");
                btn.innerText = "REGISTRAR DATOS 🚀"; btn.disabled = false;
            });
        }

        function iniciarMapa() {
            mapaMonitor = L.map('mapa-monitor').setView([14.15, -90.75], 9);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapaMonitor);
            L.marker([14.15, -90.75]).addTo(mapaMonitor).bindPopup('<b>CENTRO DE CONTROL CLON</b>');
        }

        async function actualizarDatos() {
            try {
                const response = await fetch(URL_SCRIPT);
                const data = await response.json();
                // Aquí podrías actualizar píldoras si tu script manda los conteos
            } catch (e) { console.log("Sincronizando..."); }
        }

        // DESCARGAR REPORTE (USA GET -> VA AL DOGET DEL SCRIPT)
        async function descargarCSV() {
            const inicio = document.getElementById('f-inicio').value;
            const fin = document.getElementById('f-fin').value;
            if(!inicio || !fin) return alert("Seleccioná las fechas");

            try {
                const response = await fetch(URL_SCRIPT + "?accion=reporte&t=" + new Date().getTime());
                const data = await response.json();
                const filtrados = data.filter(r => r.fecha >= inicio && r.fecha <= fin);
                
                if(filtrados.length === 0) return alert("No hay datos en este rango");

                let csv = "FECHA,HORA,DATOS_REPORTADOS\n";
                filtrados.forEach(r => { 
                    csv += `${r.fechaNice},${r.hora},"${r.datos}"\n`; 
                });

                const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.setAttribute("download", `Reporte_Clon_${inicio}.csv`);
                link.click();
            } catch (e) { alert("Error al bajar reporte del clon"); }
        }
    </script>
</body>
</html>
